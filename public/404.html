<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4f0;
        --surface: #ffffff;
        --text: #131313;
        --muted: #5a5a57;
        --border: #d7d7d2;
        --brand: #1e3a8a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(34rem, 100%);
        border: 1px solid var(--border);
        border-radius: 1rem;
        background: var(--surface);
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.6rem;
      }

      p {
        margin: 0.4rem 0;
        color: var(--muted);
      }

      a {
        color: var(--brand);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>You will be redirected to the home page shortly.</p>
      <p>
        If redirect does not happen, return to
        <a id="home-link" href="/">home</a>.
      </p>
    </main>

    <script>
      // GitHub Pages project sites are hosted under /repo-name/, so we infer that base segment on 404.
      const segments = window.location.pathname.split("/").filter(Boolean);
      const isGithubPagesHost = window.location.hostname.endsWith(".github.io");
      const basePath = isGithubPagesHost && segments.length > 1 ? `/${segments[0]}` : "";
      const homePath = `${basePath}/`;
      const homeUrl = `${window.location.origin}${homePath}`;

      const link = document.getElementById("home-link");
      if (link) link.setAttribute("href", homePath);

      window.setTimeout(() => {
        window.location.replace(homeUrl);
      }, 1600);
    </script>
  </body>
</html>
